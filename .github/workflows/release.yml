name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Check if release needed
      id: check
      run: |
        VERSION=$(cat LATEST_VERSION | tr -d '[:space:]')
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        if gh release view "v$VERSION" &>/dev/null; then
          echo "Release v$VERSION already exists, nothing to do"
          echo "should_release=false" >> "$GITHUB_OUTPUT"
        else
          echo "Release v$VERSION does not exist, will create"
          echo "should_release=true" >> "$GITHUB_OUTPUT"
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - uses: actions/setup-go@v7
      if: steps.check.outputs.should_release == 'true'
      with:
        go-version: '1.24'
        cache: true

    - name: Import GPG key
      id: import_gpg
      if: steps.check.outputs.should_release == 'true'
      uses: crazy-max/ghaction-import-gpg@v7
      with:
        gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
        passphrase: ${{ secrets.GPG_PASSPHRASE }}

    - name: Create and push tag
      if: steps.check.outputs.should_release == 'true'
      run: |
        VERSION="${{ steps.check.outputs.version }}"
        git config user.name "grepr-terraform-sync[bot]"
        git config user.email "grepr-terraform-sync[bot]@users.noreply.github.com"
        git tag "v$VERSION"
        git push origin "v$VERSION"

    - uses: goreleaser/goreleaser-action@v7
      if: steps.check.outputs.should_release == 'true'
      with:
        version: '~> v2'
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
