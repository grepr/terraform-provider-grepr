# GoReleaser configuration for the Grepr Terraform/OpenTofu provider.
#
# Produces the artifacts the OpenTofu (and Terraform) registry protocol expects:
#   - terraform-provider-grepr_<version>_<os>_<arch>.zip  (one per platform)
#   - terraform-provider-grepr_<version>_SHA256SUMS
#   - terraform-provider-grepr_<version>_SHA256SUMS.sig   (detached GPG signature)
#   - terraform-provider-grepr_<version>_manifest.json
#
# This runs in the mirrored `grepr/terraform-provider-grepr` repo, triggered by the
# release workflow on a `v*` tag. The GPG key is provided via the GPG_PRIVATE_KEY /
# PASSPHRASE repo secrets (imported in the workflow, which exports GPG_FINGERPRINT).
version: 2

# Pin the project name so archive/binary/checksum filenames are deterministic and
# match the registry-required `terraform-provider-grepr_...` pattern regardless of
# the repository GoReleaser runs in (otherwise it is inferred from the repo name).
project_name: terraform-provider-grepr

before:
  hooks:
    # The OpenAPI client is git-ignored and generated on demand, so it must be
    # regenerated before building or the module will not compile.
    - go generate ./internal/client/generated/...
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - '-s -w -X main.version={{ .Version }}'
    goos:
      - freebsd
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - '386'
      - arm
      - arm64
    ignore:
      - goos: darwin
        goarch: '386'
    binary: '{{ .ProjectName }}_v{{ .Version }}'

archives:
  - formats: ['zip']
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'

checksum:
  extra_files:
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'
  name_template: '{{ .ProjectName }}_{{ .Version }}_SHA256SUMS'
  algorithm: sha256

signs:
  - artifacts: checksum
    args:
      - '--batch'
      - '--local-user'
      - '{{ .Env.GPG_FINGERPRINT }}'
      - '--output'
      - '${signature}'
      - '--detach-sign'
      - '${artifact}'

release:
  extra_files:
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'

changelog:
  disable: true
